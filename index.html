<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none; }
        .header { font-family: 'Rajdhani'; font-size: 1.5rem; margin-bottom: 30px; border-bottom: 1px solid rgba(0,206,209,0.3); padding-bottom: 15px; }
        .status-card { background: var(--panel); border-radius: 20px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; text-align: center; }
        .status-card.active { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 206, 209, 0.2); }
        .insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .insight-card { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 6px; background: #080808; color: #333; }
        .cal-day.worked { border: 1px solid var(--cyan); color: var(--cyan); background: rgba(0,206,209,0.1); }
        .log-item { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--cyan); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="auth-overlay" style="padding: 20px; text-align: center;">
        <h2 style="font-family:'Rajdhani'; margin-bottom:20px;">PORTAL LOGIN</h2>
        <input type="email" id="email" placeholder="E-Mail" style="width:100%; padding:12px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff;">
        <input type="password" id="pass" placeholder="Passwort" style="width:100%; padding:12px; margin-bottom:20px; background:#111; border:1px solid #333; color:#fff;">
        <button onclick="handleAuth()" style="width:100%; padding:15px; background:var(--cyan); border:none; font-weight:bold; cursor:pointer;">ANMELDEN</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="header">ICONIC <span>PORTAL</span></div>
        <div id="status-card" class="status-card">
            <h2 id="status-title">SYSTEM STANDBY</h2>
            <p id="status-desc">Bereit für neue Aufgaben.</p>
        </div>
        <div class="insights-grid">
            <div class="insight-card" style="grid-column: span 2;"><span id="insight-main-project">Kein aktives Projekt</span></div>
            <div class="insight-card"><span id="insight-days" style="color:var(--cyan); font-weight:bold;">0</span> Tage</div>
            <div class="insight-card"><span id="insight-hours" style="color:var(--cyan); font-weight:bold;">0h</span> Zeit</div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
        <div id="log-details"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";
        const normalize = (str) => str ? str.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim() : "";

        window.handleAuth = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Fehler"));
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initPortal(user.displayName || "Kunde");
            }
        });

        function initPortal(userName) {
            const userKey = normalize(userName);

            // 1. Live Status
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                const card = document.getElementById('status-card');
                if(s.exists() && s.data().active && normalize(s.data().partner) === userKey) {
                    card.classList.add('active');
                    document.getElementById('status-title').innerText = "PROJEKT IN ARBEIT";
                    document.getElementById('status-desc').innerText = s.data().project || "Wird bearbeitet...";
                } else {
                    card.classList.remove('active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                }
            });

            // 2. Worklogs & Kalender
            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const logs = snap.docs.map(d => d.data()).filter(l => normalize(l.partner) === userKey);
                
                // Kalender immer zeichnen
                renderCalendar(logs);
                
                // Stats füllen
                const uniqueDays = new Set(logs.map(l => l.date)).size;
                document.getElementById('insight-days').innerText = uniqueDays;
                
                let totalMin = 0;
                logs.forEach(l => {
                    const parts = (l.duration || "0:0").split(':');
                    totalMin += (parseInt(parts[0]) * 60) + parseInt(parts[1]);
                });
                document.getElementById('insight-hours').innerText = (totalMin / 60).toFixed(1) + "h";
                if(logs.length > 0) document.getElementById('insight-main-project').innerText = logs[0].project;
            });
        }

        function renderCalendar(logs) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            const workedDates = logs.map(l => l.date);

            for(let i = 1; i <= daysInMonth; i++) {
                const dayStr = `${new Date().getFullYear()}-${(new Date().getMonth() + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                const div = document.createElement('div');
                div.className = 'cal-day' + (workedDates.includes(dayStr) ? ' worked' : '');
                div.innerText = i;
                grid.appendChild(div);
            }
        }
    </script>
</body>
</html>
