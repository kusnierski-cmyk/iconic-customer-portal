<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Customer Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ICONIC">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; --danger: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; min-height: 100vh; }
        .hidden { display: none !important; }

        .header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(17,17,17,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,206,209,0.1); }
        .header h1 { font-family: 'Rajdhani'; font-size: 1.5rem; letter-spacing: 2px; }
        .header span { color: var(--cyan); }

        .pulse-card { 
            background: linear-gradient(135deg, #111 0%, #080808 100%);
            border-radius: 20px; padding: 30px; text-align: center; margin: 20px;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s ease;
        }
        .pulse-card.active { 
            border-color: var(--cyan); 
            animation: card-breathe 1.5s infinite alternate; 
        }
        .active-pulse { display: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; margin: 0 auto 15px; }
        .active .active-pulse { display: block; animation: core-pulse 1.2s infinite; }
        
        @keyframes core-pulse { 
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 206, 209, 0.9), 0 0 10px rgba(0, 206, 209, 1); } 
            70% { transform: scale(1.2); box-shadow: 0 0 0 25px rgba(0, 206, 209, 0), 0 0 40px rgba(0, 206, 209, 0.8); } 
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 206, 209, 0), 0 0 10px rgba(0, 206, 209, 1); } 
        }
        @keyframes card-breathe {
            0% { box-shadow: 0 0 20px rgba(0, 206, 209, 0.2), inset 0 0 10px rgba(0, 206, 209, 0.05); }
            100% { box-shadow: 0 0 60px rgba(0, 206, 209, 0.6), inset 0 0 20px rgba(0, 206, 209, 0.2); }
        }

        .section-title { font-family: 'Rajdhani'; font-size: 1.2rem; color: var(--gray); margin: 30px 20px 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .log-container { padding: 0 20px; }
        .log-card { 
            background: var(--panel); padding: 18px; border-radius: 15px; margin-bottom: 12px; 
            border-left: 4px solid var(--cyan); display: flex; justify-content: space-between; align-items: center;
        }

        .request-box { background: var(--panel); margin: 0 20px 50px; padding: 25px; border-radius: 20px; border: 1px solid rgba(0,206,209,0.1); }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: inherit; outline: none; }
        input:focus, textarea:focus { border-color: var(--cyan); }
        .btn { width: 100%; background: var(--cyan); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-family: 'Rajdhani'; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }

        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); position: fixed; width: 100%; z-index: 10000; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--cyan); width: 90%; max-width: 380px; text-align: center; }
        .toggle-auth { color: var(--cyan); font-size: 0.8rem; margin-top: 15px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title" style="font-family:'Rajdhani'; margin-bottom:25px; letter-spacing:2px;">ICONIC <span style="color:var(--cyan)">LOGIN</span></h2>
            <input type="text" id="login-name" placeholder="Vollständiger Name (für CRM)" style="display:none;">
            <input type="email" id="login-email" placeholder="E-Mail Adresse">
            <input type="password" id="login-pass" placeholder="Passwort">
            
            <div id="privacy-box" style="display:none; text-align:left; margin-bottom:15px;">
                <label style="font-size:0.75rem; color:var(--gray); display:flex; align-items:flex-start; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="privacy-check" style="width:auto; margin:0; margin-top:3px;">
                    <span>Ich habe die Datenschutzbestimmungen gelesen und akzeptiere diese.</span>
                </label>
            </div>

            <button class="btn" id="auth-btn" onclick="handleAuth()">Einloggen</button>
            <p id="auth-toggle-text" class="toggle-auth" onclick="toggleAuthMode()">Noch kein Konto? Jetzt registrieren</p>
            <p id="auth-error" style="color:var(--danger); font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="portal-content" class="hidden">
        <div class="header">
            <h1>ICONIC <span>PORTAL</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="pulse-card" class="pulse-card">
            <div class="active-pulse"></div>
            <h4 id="live-label" style="font-family:'Rajdhani'; color:var(--gray); letter-spacing:2px;">SYSTEM BEREIT</h4>
            <h2 id="live-project" style="font-family:'Rajdhani'; font-size:1.8rem; margin:10px 0;">STANDBY</h2>
            <p id="live-desc" style="font-size:0.8rem; color:var(--gray);">Aktuell keine aktive Sitzung.</p>
        </div>

        <h3 class="section-title">Aktivitäten & Historie</h3>
        <div class="log-container" id="all-activities">
            <p style="text-align:center; color:var(--gray); font-size:0.8rem;">Suche Aktivitäten...</p>
        </div>

                <h3 class="section-title">Dateien & Anfrage</h3>
        <div class="request-box">
            <div id="drive-area" class="hidden" style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center;">
                <p style="font-size: 0.7rem; color: var(--gray); margin-bottom: 10px; text-transform: uppercase;">Dein Projekt-Ordner</p>
                <button onclick="window.open(window.customerDriveLink, '_blank')" style="background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
                    <i class="fa-brands fa-google-drive" style="color: #34a853; font-size: 1.4rem;"></i>
                    <span style="font-family: 'Rajdhani'; font-weight: 700; letter-spacing: 1px;">DATEIEN ÖFFNEN</span>
                </button>
            </div>

            <input type="text" id="req-title" placeholder="Betreff">
            <textarea id="req-msg" rows="4" placeholder="Deine Nachricht..."></textarea>
            <button class="btn" onclick="sendRequest()">Anfrage senden</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";



        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_UID = "wn9blxkhF7UbSfv0gnqW3EDb1zx2"; 
        let isLoginMode = true;

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerHTML = isLoginMode ? 'ICONIC <span style="color:var(--cyan)">LOGIN</span>' : 'ICONIC <span style="color:var(--cyan)">REGISTRIEREN</span>';
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Einloggen' : 'Konto erstellen';
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? 'Noch kein Konto? Jetzt registrieren' : 'Bereits ein Konto? Zum Login';
            document.getElementById('login-name').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('privacy-box').style.display = isLoginMode ? 'none' : 'block';
        };

        window.handleAuth = async () => {
            const name = document.getElementById('login-name').value.trim();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const privacyChecked = document.getElementById('privacy-check').checked;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    if(!name) throw new Error("Name fehlt.");
                    if(!privacyChecked) throw new Error("Bitte akzeptiere die Datenschutzbestimmungen.");
                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(userCred.user, { displayName: name });
                }
                location.reload();
            } catch (e) {
                document.getElementById('auth-error').innerText = "Fehler: " + e.message;
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('portal-content').classList.remove('hidden');
                startSync(user.displayName || "iconic");
            }
        });

        function startSync(clientName) {
            const cleanName = clientName.toLowerCase().trim();
        const fetchDriveLink = async () => {
            try {
                // 1. Versuch: In der Kundenliste des Admins suchen
                const crmQuery = query(collection(db, "users", ADMIN_UID, "customers"), where("email", "==", auth.currentUser.email));
                const crmSnap = await getDocs(crmQuery);
                
                let foundLink = null;
                crmSnap.forEach((doc) => { if(doc.data().drive) foundLink = doc.data().drive; });

                // 2. Versuch: Falls nichts gefunden (wegen Rechten), in der User-Sammlung suchen
                if (!foundLink) {
                    const uQuery = query(collection(db, "users"), where("email", "==", auth.currentUser.email));
                    const uSnap = await getDocs(uQuery);
                    uSnap.forEach((doc) => { if(doc.data().drive) foundLink = doc.data().drive; });
                }

                if (foundLink) {
                    window.customerDriveLink = foundLink;
                    document.getElementById('drive-area').classList.remove('hidden');
                }
            } catch (e) {
                console.log("Drive-Hinweis: Link wird noch synchronisiert.");
            }
        };
        fetchDriveLink();




            onSnapshot(doc(db, "global_status", "live"), (snap) => {
                const data = snap.data();
                const card = document.getElementById('pulse-card');
                const crmPartner = data?.partner ? data.partner.toLowerCase().trim() : "";
                
                if(data && data.active && (crmPartner === cleanName || cleanName.includes(crmPartner) || crmPartner.includes(cleanName))) {
                    card.classList.add('active');
                    document.getElementById('live-label').innerText = "LIVE-ÜBERTRAGUNG AKTIV";
                    document.getElementById('live-project').innerText = (data.project || "Projekt").toUpperCase();
                    document.getElementById('live-desc').innerText = "Dein Projekt wird gerade bearbeitet.";
                    document.getElementById('live-label').style.color = "var(--cyan)";
                } else {
                    card.classList.remove('active');
                    document.getElementById('live-label').innerText = "SYSTEM BEREIT";
                    document.getElementById('live-project').innerText = "STANDBY";
                    document.getElementById('live-desc').innerText = "Aktuell keine aktive Sitzung.";
                    document.getElementById('live-label').style.color = "var(--gray)";
                }
            });

            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const container = document.getElementById('all-activities');
                let logs = snap.docs.map(d => d.data());
                const filtered = logs.filter(l => l.partner && l.partner.toLowerCase().trim() === cleanName);
                filtered.sort((a, b) => (b.date || "").localeCompare(a.date || ""));

                if(filtered.length === 0) {
                    container.innerHTML = `<p style="text-align:center; color:var(--gray); padding:20px;">Keine Einträge für "${clientName}" gefunden.</p>`;
                    return;
                }

                container.innerHTML = "";
                filtered.forEach(log => {
                    const d = log.date ? log.date.split('-').reverse().join('.') : "Info";
                    const startTime = log.events?.find(e => e.type === 'Start')?.time || '--:--';
                    const pauseTime = log.events?.find(e => e.type === 'Pause')?.time || 'Keine';
                    const price = log.earned ? new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(log.earned) : '0,00 €';

                    container.innerHTML += `
                        <div class="log-card">
                            <div style="flex: 1; padding-right: 15px;">
                                <div style="font-weight:600;">${log.project || 'Aufgabe'}</div>
                                <div style="font-size:0.75rem; color:var(--gray); margin-bottom: 5px;">${log.desc || ''}</div>
                                <div style="font-size:0.75rem; color:var(--gray); margin-top:4px;">
                                    <i class="fa-regular fa-calendar"></i> ${d} | 
                                    <i class="fa-regular fa-clock"></i> Start: ${startTime} | 
                                    <i class="fa-solid fa-pause"></i> Pause: ${pauseTime}
                                </div>
                            </div>
                            <div style="text-align:right">
                                <div style="color:var(--cyan); font-weight:700;">${price}</div>
                                <div style="font-size:0.7rem; color:var(--gray);">${log.duration || '00:00'}</div>
                            </div>
                        </div>`;
                });
            });
        }

                                window.sendRequest = async () => {
            const titleInput = document.getElementById('req-title').value; 
            const msgInput = document.getElementById('req-msg').value;
            
            if(!titleInput || !msgInput) return alert("Bitte fülle alle Felder aus.");

            try {
                // Wir suchen in der Collection "users" nach der E-Mail des aktuell eingeloggten Nutzers
                const userQuery = query(collection(db, "users"), where("email", "==", auth.currentUser.email));
                const querySnapshot = await getDocs(userQuery);
                
                let firmenName = auth.currentUser.email; // Fallback, falls kein Eintrag gefunden wird

                // Wenn ein Dokument mit dieser E-Mail gefunden wurde, nimm die 'company'
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.company) {
                        firmenName = data.company;
                    }
                });

                // Absenden an das CRM
                await addDoc(collection(db, "requests"), {
                    title: firmenName, // Firmenname als fette Überschrift
                    desc: "BETREFF: " + titleInput + "\n\nNACHRICHT: " + msgInput,
                    partner: firmenName,
                    email: auth.currentUser.email,
                    timestamp: new Date().toISOString(),
                    status: "offen"
                });

                alert("Anfrage gesendet!");
                document.getElementById('req-title').value = "";
                document.getElementById('req-msg').value = "";
            } catch (e) {
                console.error("Fehler:", e);
                alert("Fehler beim Senden: " + e.message);
            }
        };



    </script>
</body>
</html>
