<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Customer Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; --danger: #ff4757; --success: #2ed573; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; min-height: 100vh; line-height: 1.6; }
        .hidden { display: none !important; }

        /* --- LOGIN --- */
        #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); position: fixed; width: 100%; z-index: 10000; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--cyan); width: 90%; max-width: 380px; text-align: center; }

        /* --- HEADER --- */
        .header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(17,17,17,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,206,209,0.1); }
        .header h1 { font-family: 'Rajdhani'; font-size: 1.5rem; letter-spacing: 2px; }
        .header span { color: var(--cyan); }

        /* --- LIVE INDICATOR --- */
        .live-status-container { padding: 20px; margin-top: 10px; }
        .pulse-card { 
            background: linear-gradient(135deg, #111 0%, #080808 100%);
            border-radius: 20px; padding: 30px; text-align: center;
            position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s;
        }
        .pulse-card.active { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 206, 209, 0.2); }
        
        .pulse-ring { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: var(--cyan); border-radius: 50%; opacity: 0.3;
        }
        .active .pulse-ring { display: block; animation: ripple 2s infinite; }
        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }

        /* --- CALENDAR --- */
        .section-title { font-family: 'Rajdhani'; font-size: 1.2rem; color: var(--gray); margin: 30px 20px 10px; text-transform: uppercase; letter-spacing: 1px; }
        .calendar-wrap { background: var(--panel); margin: 0 20px; border-radius: 20px; padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-header { font-size: 0.7rem; color: var(--gray); text-align: center; font-weight: bold; padding-bottom: 10px; }
        .cal-day { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            font-size: 0.9rem; border-radius: 10px; background: #000; cursor: pointer;
            border: 1px solid transparent; transition: 0.3s;
        }
        .cal-day.worked { 
            border-color: var(--cyan); color: var(--cyan); font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,206,209,0.2);
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(0,206,209,0.1); } to { box-shadow: 0 0 15px rgba(0,206,209,0.4); } }
        .cal-day.selected { background: var(--cyan) !important; color: #000 !important; }

        /* --- DAY DETAILS --- */
        #day-details { margin: 15px 20px; padding: 20px; background: rgba(0,206,209,0.05); border-radius: 15px; border-left: 4px solid var(--cyan); display: none; }
        .event-line { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- LOGS --- */
        .log-container { padding: 0 20px; }
        .log-card { background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 3px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }

        /* --- REQUEST FORM --- */
        .request-box { background: var(--panel); margin: 30px 20px 50px; padding: 25px; border-radius: 20px; border: 1px solid rgba(0,206,209,0.2); }
        
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--cyan); }
        .btn { width: 100%; background: var(--cyan); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 700; font-family: 'Rajdhani'; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family:'Rajdhani'; margin-bottom:25px; letter-spacing:2px;">ICONIC <span style="color:var(--cyan)">PORTAL</span></h2>
            <input type="email" id="login-email" placeholder="E-Mail Adresse">
            <input type="password" id="login-pass" placeholder="Passwort">
            <button class="btn" id="login-btn" onclick="handleAuth()">Einloggen</button>
            <p id="auth-error" style="color:var(--danger); font-size:0.8rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="portal-content" class="hidden">
        <div class="header">
            <h1>ICONIC <span>PORTAL</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="live-status-container">
            <div id="pulse-card" class="pulse-card">
                <div class="pulse-ring"></div>
                <h4 id="live-label" style="font-family:'Rajdhani'; color:var(--gray); letter-spacing:2px;">SYSTEM STANDBY</h4>
                <h2 id="live-project" style="font-family:'Rajdhani'; font-size:1.8rem; margin:10px 0;">BEREIT</h2>
                <p id="live-desc" style="font-size:0.8rem; color:var(--gray);">Aktuell keine aktive Bearbeitung.</p>
            </div>
        </div>

        <h3 class="section-title">Dein Projekt-Kalender</h3>
        <div class="calendar-wrap">
            <div id="cal-month-name" style="text-align:center; font-weight:bold; margin-bottom:15px; color:var(--cyan)"></div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <div id="day-details">
            <h4 id="detail-date" style="font-family:'Rajdhani'; color:var(--cyan); margin-bottom:10px;"></h4>
            <div id="detail-events"></div>
        </div>

        <h3 class="section-title">Letzte Aktivitäten</h3>
        <div class="log-container" id="log-list"></div>

        <h3 class="section-title">Neue Anfrage senden</h3>
        <div class="request-box">
            <input type="text" id="req-title" placeholder="Betreff / Projektname">
            <textarea id="req-msg" rows="4" placeholder="Beschreibe deine Änderung oder dein neues Anliegen..."></textarea>
            <button class="btn" onclick="sendRequest()">Anfrage absenden</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Die Admin UID aus deinem CRM
        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";
        let userWorkLogs = [];

        // AUTH LOGIK
        window.handleAuth = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                document.getElementById('auth-error').innerText = "Zugangsdaten nicht korrekt.";
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('portal-content').classList.remove('hidden');
                startPortalSync(user);
            }
        });

        function startPortalSync(user) {
            const partnerName = user.displayName || user.email.split('@')[0];
            const cleanName = partnerName.toLowerCase().replace(/\s/g, '');

            // 1. LIVE STATUS PULSE
            onSnapshot(doc(db, "global_status", "live"), (snap) => {
                const data = snap.data();
                const card = document.getElementById('pulse-card');
                if(data && data.active && data.partner.toLowerCase().replace(/\s/g, '') === cleanName) {
                    card.classList.add('active');
                    document.getElementById('live-label').innerText = "LIVE IN BEARBEITUNG";
                    document.getElementById('live-project').innerText = data.project.toUpperCase();
                    document.getElementById('live-desc').innerText = "Dein Designer arbeitet gerade an diesem Projekt.";
                } else {
                    card.classList.remove('active');
                    document.getElementById('live-label').innerText = "SYSTEM STANDBY";
                    document.getElementById('live-project').innerText = "BEREIT";
                    document.getElementById('live-desc').innerText = "Aktuell keine aktive Bearbeitung.";
                }
            });

            // 2. WORKLOGS & KALENDER
            onSnapshot(query(collection(db, "users", ADMIN_UID, "worklogs"), orderBy("date", "desc")), (snap) => {
                userWorkLogs = snap.docs
                    .map(d => d.data())
                    .filter(l => l.partner.toLowerCase().replace(/\s/g, '') === cleanName);
                
                renderCalendar();
                renderLogList();
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            document.getElementById('cal-month-name').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(now);

            // Wochentage Header
            ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"].forEach(d => {
                grid.innerHTML += `<div class="cal-header">${d}</div>`;
            });

            const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const hasWork = userWorkLogs.some(l => l.date === dateStr);
                
                const dayEl = document.createElement('div');
                dayEl.className = `cal-day ${hasWork ? 'worked' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => showDetails(dateStr, hasWork);
                grid.appendChild(dayEl);
            }
        }

        function showDetails(dateStr, hasWork) {
            const detailBox = document.getElementById('day-details');
            if(!hasWork) { detailBox.style.display = 'none'; return; }
            
            const logs = userWorkLogs.filter(l => l.date === dateStr);
            detailBox.style.display = 'block';
            document.getElementById('detail-date').innerText = new Date(dateStr).toLocaleDateString('de-DE', {day:'2-digit', month:'long'});
            
            let html = "";
            logs.forEach(l => {
                html += `<div style="margin-bottom:15px; border-bottom:1px solid rgba(0,206,209,0.1); padding-bottom:10px;">
                            <div style="font-weight:bold; color:white; font-size:0.9rem;">${l.project}</div>
                            <div style="font-size:0.7rem; color:var(--cyan); margin-bottom:8px;">DAUER: ${l.duration}</div>`;
                if(l.events) {
                    l.events.forEach(e => {
                        html += `<div class="event-line"><span>${e.type}</span><span style="color:var(--gray)">${e.time} Uhr</span></div>`;
                    });
                }
                html += `</div>`;
            });
            document.getElementById('detail-events').innerHTML = html;
            detailBox.scrollIntoView({behavior:'smooth'});
        }

        function renderLogList() {
            const container = document.getElementById('log-list');
            if(userWorkLogs.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:var(--gray); font-size:0.8rem;">Noch keine Aktivitäten vorhanden.</p>`;
                return;
            }
            container.innerHTML = userWorkLogs.slice(0, 5).map(l => `
                <div class="log-card">
                    <div>
                        <div style="font-weight:600; font-size:0.9rem;">${l.project}</div>
                        <div style="font-size:0.75rem; color:var(--gray);">${new Date(l.date).toLocaleDateString('de-DE')}</div>
                    </div>
                    <div style="font-family:'Rajdhani'; font-weight:700; color:var(--cyan);">${l.duration}</div>
                </div>
            `).join('');
        }

        window.sendRequest = async () => {
            const title = document.getElementById('req-title').value;
            const msg = document.getElementById('req-msg').value;
            if(!title || !msg) return alert("Bitte fülle alle Felder aus.");

            const partnerName = auth.currentUser.displayName || auth.currentUser.email.split('@')[0];

            await addDoc(collection(db, "requests"), {
                title: title,
                desc: msg,
                partner: partnerName,
                timestamp: Date.now()
            });

            alert("Deine Anfrage wurde direkt ins CRM übertragen!");
            document.getElementById('req-title').value = "";
            document.getElementById('req-msg').value = "";
        };
    </script>
</body>
</html>
