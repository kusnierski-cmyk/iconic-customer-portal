<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; --danger: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; padding: calc(20px + env(safe-area-inset-top)) 20px 50px 20px; max-width: 600px; margin: 0 auto; }
        
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid var(--cyan); width: 100%; max-width: 400px; }
        .hidden { display: none; }

        .header { font-family: 'Rajdhani'; font-size: 1.5rem; margin-bottom: 30px; border-bottom: 1px solid rgba(0,206,209,0.3); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header span { color: var(--cyan); }
        
        .status-card { background: var(--panel); border-radius: 20px; padding: 40px 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; text-align: center; position: relative; overflow: hidden; }
        .status-card.active { border-color: var(--cyan); animation: pulseGlow 2s infinite alternate; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(0, 206, 209, 0.1); } 100% { box-shadow: 0 0 30px rgba(0, 206, 209, 0.4); border-color: #fff; } }
        
        .insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .insight-card { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--panel); padding: 12px; border-radius: 15px; margin-bottom: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; border-radius: 6px; background: #080808; color: #444; }
        .cal-day.worked { border: 1px solid var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,206,209,0.2); background: rgba(0,206,209,0.1); }

        .log-item { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 0.85rem; border-left: 3px solid var(--cyan); }
        .log-meta { display: flex; justify-content: space-between; color: var(--gray); font-size: 0.75rem; margin-top: 5px; }

        .form-section { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); margin-top: 30px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--cyan); }
        .btn-send { width: 100%; background: var(--cyan); border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Rajdhani'; color: #000; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="font-family:'Rajdhani'; color:var(--white); margin-bottom:20px;">ICONIC <span style="color:var(--cyan)">PORTAL</span></h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="pass" placeholder="Passwort">
            <button class="btn-send" onclick="handleAuth()">Anmelden</button>
            <p id="auth-error" style="color:var(--danger); font-size:0.75rem; margin-top:15px; text-align:center;"></p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="header"><div>ICONIC <span>PORTAL</span></div><button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fa-solid fa-power-off"></i></button></div>
        
        <div id="status-card" class="status-card">
            <h2 id="status-title">SYSTEM STANDBY</h2>
            <p id="status-desc">Bereit für neue Aufgaben.</p>
        </div>

        <div class="insights-grid">
            <div class="insight-card" style="grid-column: span 2;"><span id="insight-main-project">Keine aktiven Daten</span></div>
            <div class="insight-card"><span id="insight-days">0</span> Tage</div>
            <div class="insight-card"><span id="insight-hours">0h</span> Zeit</div>
        </div>

        <div class="calendar-grid" id="calendar"></div>
        <div id="log-details"></div>

        <div class="form-section">
            <h3 style="font-family:'Rajdhani'; margin-bottom:15px; color:var(--cyan)">ANFRAGE SENDEN</h3>
            <input type="text" id="req-title" placeholder="Betreff / Projekt">
            <textarea id="req-msg" rows="3" placeholder="Beschreibe dein Anliegen..."></textarea>
            <button class="btn-send" onclick="sendRequest()">Senden</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, query, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);

        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2"; 
        let userCompany = "";

        window.handleAuth = async () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { document.getElementById('auth-error').innerText = "Login fehlgeschlagen."; }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if(user) {
                userCompany = user.displayName || "Kunde";
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                initPortal();
            }
        });

        function initPortal() {
            // 1. Live Status Sync
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                if(!s.exists()) return;
                const d = s.data();
                const card = document.getElementById('status-card');
                if(d.active && d.partner?.toLowerCase().trim() === userCompany.toLowerCase().trim()) {
                    card.classList.add('active');
                    document.getElementById('status-title').innerText = "LIVE IN PROGRESS";
                    document.getElementById('status-desc').innerText = "Bearbeitung: " + (d.project || "Aktiv");
                } else {
                    card.classList.remove('active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                    document.getElementById('status-desc').innerText = "Bereit für neue Aufgaben.";
                }
            });

            // 2. Worklogs Sync
            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const logs = snap.docs.map(d => d.data())
                    .filter(l => l.partner?.toLowerCase().trim() === userCompany.toLowerCase().trim())
                    .sort((a,b) => new Date(b.date) - new Date(a.date));
                
                renderStats(logs);
                renderCalendar(logs);
                renderDetails(logs);
            });
        }

        function renderStats(logs) {
            const days = new Set(logs.map(l => l.date)).size;
            document.getElementById('insight-days').innerText = days;
            let totalMin = 0;
            logs.forEach(l => { 
                if(l.duration?.includes(':')) { 
                    const [h, m] = l.duration.split(':').map(Number); 
                    totalMin += (h * 60) + m; 
                } 
            });
            document.getElementById('insight-hours').innerText = (totalMin / 60).toFixed(1) + "h";
            if(logs.length > 0) document.getElementById('insight-main-project').innerText = logs[0].project;
        }

        function renderCalendar(logs) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            // Worked Dates sammeln (Format YYYY-MM-DD für Vergleich)
            const worked = logs.map(l => l.date);

            for(let i = 1; i <= daysInMonth; i++) {
                const day = i.toString().padStart(2, '0');
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const dateStr = `${now.getFullYear()}-${month}-${day}`;
                
                const div = document.createElement('div');
                div.className = `cal-day ${worked.includes(dateStr) ? 'worked' : ''}`;
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function renderDetails(logs) {
            const container = document.getElementById('log-details');
            container.innerHTML = logs.length ? '<h3 style="font-family:\'Rajdhani\'; margin:20px 0 10px 0; color:var(--gray); font-size:1rem;">LETZTE AKTIVITÄTEN</h3>' : '';
            logs.slice(0, 5).forEach(l => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between">
                        <strong>${l.project}</strong>
                        <span style="color:var(--cyan)">${l.duration}h</span>
                    </div>
                    <div class="log-meta">
                        <span>${l.date}</span>
                        <span>${l.earned ? Number(l.earned).toFixed(2) : '0.00'} €</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        window.sendRequest = async () => {
            const title = document.getElementById('req-title').value.trim();
            const msg = document.getElementById('req-msg').value.trim();
            if(!title || !msg) return alert("Bitte alle Felder ausfüllen.");
            
            try {
                // EXAKT passend zu deinem CRM-Code (data.title, data.desc, data.timestamp)
                await addDoc(collection(db, "requests"), {
                    title: title,
                    desc: msg,
                    partner: userCompany,
                    status: "offen",
                    timestamp: Date.now() // CRM nutzt new Date(data.timestamp), daher Date.now() statt serverTimestamp
                });
                alert("Anfrage erfolgreich gesendet!");
                document.getElementById('req-title').value = "";
                document.getElementById('req-msg').value = "";
            } catch (e) { alert("Sende-Fehler."); }
        };
    </script>
</body>
</html>
