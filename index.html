<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenportal | ICONIC VISUAL CONCEPTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #111; --cyan: #00CED1; --white: #fff; --gray: #888; --success: #2ed573; }
        body { background: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { font-family: 'Rajdhani', sans-serif; border-bottom: 1px solid var(--cyan); padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--panel); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        .status-badge { background: var(--cyan); color: #000; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        
        /* Kalender Styling */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1; border: 1px solid #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #444; }
        .cal-day.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,206,209,0.05); font-weight: bold; }

        /* Aktivitäten */
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .log-item:last-child { border: none; }

        .form-control { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: var(--cyan); color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        #login-view { text-align: center; margin-top: 100px; }
        h2 { font-family: 'Rajdhani'; color: var(--cyan); margin-top: 0; }
    </style>
</head>
<body>

    <div id="login-view" class="container">
        <h1 style="font-family: 'Rajdhani';">CLIENT <span>LOGIN</span></h1>
        <input type="email" id="email" class="form-control" style="max-width:300px" placeholder="E-Mail"><br>
        <input type="password" id="password" class="form-control" style="max-width:300px" placeholder="Passwort"><br>
        <button class="btn" style="max-width:300px" onclick="login()">Anmelden</button>
    </div>

    <div id="portal-view" class="container" style="display:none;">
        <div class="header">
            <h1>WELCOME, <span id="client-name" style="color:var(--cyan)">...</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:var(--gray); cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="project-card" class="card">
            <h2>PROJEKT STATUS</h2>
            <div id="project-info">Lade Daten...</div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="card">
                <h2>AKTIVITÄT</h2>
                <div class="calendar-grid" id="calendar"></div>
                <p style="font-size: 0.7rem; color: var(--gray); margin-top: 15px;">Markierte Tage zeigen Arbeitszeit an.</p>
            </div>
            
            <div class="card">
                <h2>LETZTE LOGS</h2>
                <div id="activity-logs">Keine Aktivitäten aufgezeichnet.</div>
            </div>
        </div>

        <div class="card">
            <h2>NEUE ANFRAGE / NACHRICHT</h2>
            <textarea id="request-text" class="form-control" rows="4" placeholder="Beschreibe deine Änderungswünsche oder eine neue Anfrage..."></textarea>
            <button class="btn" onclick="sendRequest()">Anfrage senden</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, query, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentClient = "";

        window.login = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login fehlgeschlagen"));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('portal-view').style.display = 'block';
                
                // Wir nutzen wieder den Namen (z.B. Test)
                currentClient = user.displayName || user.email.split('@')[0];
                document.getElementById('client-name').innerText = currentClient.toUpperCase();

                loadProjectData();
                loadActivityLogs();
                renderCalendarBase();
            } else {
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('portal-view').style.display = 'none';
            }
        });

        function loadProjectData() {
            onSnapshot(doc(db, "projekte", currentClient), (docSnap) => {
                const info = document.getElementById('project-info');
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    info.innerHTML = `
                        <h3 style="margin:0">${data.projektname || 'Projekt'}</h3>
                        <p>Status: <span class="status-badge">${data.status}</span></p>
                        <small style="color:var(--gray)">Zuletzt aktualisiert: ${data.letztes_update}</small>
                    `;
                } else {
                    info.innerHTML = "Kein aktives Projekt gefunden.";
                }
            });
        }

        function loadActivityLogs() {
            // Sucht in allen worklogs nach Einträgen für diesen Partner (Test)
            // Hinweis: Hierfür muss in der Firebase ggf. ein Index erstellt werden (Link erscheint in Konsole falls nötig)
            const q = query(collection(db, "users/69oYfCidK8MOfT9l9Kshh0U6VpS2/worklogs"), where("partner", "==", currentClient));
            
            onSnapshot(q, (snap) => {
                const logCont = document.getElementById('activity-logs');
                const calDays = document.querySelectorAll('.cal-day');
                logCont.innerHTML = "";
                
                snap.forEach(doc => {
                    const log = doc.data();
                    // Log Liste
                    logCont.innerHTML += `
                        <div class="log-item">
                            <span>${log.date} - ${log.project}</span>
                            <span style="color:var(--cyan)">${log.duration}h</span>
                        </div>
                    `;
                    // Kalender Markierung
                    const dayNum = new Date(log.date).getDate();
                    const calEl = document.getElementById('day-' + dayNum);
                    if(calEl) calEl.classList.add('active');
                });
            });
        }

        window.sendRequest = async () => {
            const text = document.getElementById('request-text').value;
            if(!text) return;

            try {
                await addDoc(collection(db, "anfragen"), {
                    kunde: currentClient,
                    nachricht: text,
                    zeitpunkt: new Date().toLocaleString(),
                    status: "neu"
                });
                alert("Anfrage wurde erfolgreich an das CRM gesendet!");
                document.getElementById('request-text').value = "";
            } catch (e) {
                alert("Fehler beim Senden.");
            }
        };

        function renderCalendarBase() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = "";
            for(let i=1; i<=31; i++) {
                cal.innerHTML += `<div class="cal-day" id="day-${i}">${i}</div>`;
            }
        }
    </script>
</body>
</html>
