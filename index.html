<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; padding-top: 70px; }
        .hidden { display: none !important; }

        /* Header & Logout */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-family: 'Rajdhani'; font-size: 1.2rem; margin: 0; letter-spacing: 2px; }
        .logout-btn { background: none; border: none; color: #ff4444; font-size: 1.3rem; cursor: pointer; padding: 10px; }

        /* Login */
        .login-box { max-width: 400px; margin: 100px auto; text-align: center; background: var(--panel); padding: 30px; border-radius: 20px; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: inherit; }
        .btn-main { width: 100%; background: var(--cyan); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-family: 'Rajdhani'; cursor: pointer; font-size: 1rem; }

        /* Cards */
        .card { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .status-active { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,206,209,0.2); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--panel); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { display: block; color: var(--cyan); font-weight: 700; font-size: 1.5rem; font-family: 'Rajdhani'; }

        /* Kalender */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 15px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 6px; background: #080808; color: #444; }
        .cal-day.worked { background: rgba(0,206,209,0.2); color: var(--cyan); border: 1px solid var(--cyan); font-weight: bold; }
    </style>
</head>
<body>

    <div id="nav-header" class="header hidden">
        <h1>ICONIC <span style="color:var(--cyan)">PORTAL</span></h1>
        <button class="logout-btn" id="btn-logout"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <div id="auth-overlay" class="login-box">
        <h2 style="font-family:'Rajdhani'; margin-bottom:20px;">PORTAL LOGIN</h2>
        <input type="email" id="login-email" placeholder="E-Mail">
        <input type="password" id="login-pass" placeholder="Passwort">
        <button class="btn-main" id="btn-login">ANMELDEN</button>
    </div>

    <div id="main-content" class="hidden">
        <div id="status-card" class="card">
            <h2 id="status-title" style="margin:0; font-family:'Rajdhani';">SYSTEM STANDBY</h2>
            <p id="status-desc" style="color:var(--gray); margin:10px 0 0 0; font-size:0.9rem;">Bereit für neue Aufgaben.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span id="insight-days" class="stat-val">0</span><small>Tage</small></div>
            <div class="stat-box"><span id="insight-hours" class="stat-val">0h</span><small>Gesamtzeit</small></div>
        </div>

        <div class="card">
            <p style="margin:0 0 15px 0; font-size:0.8rem; color:var(--cyan); font-weight:bold;">AKTIVITÄT</p>
            <div id="calendar" class="cal-grid"></div>
        </div>

        <div class="card">
            <input type="text" id="req-title" placeholder="Betreff">
            <textarea id="req-desc" rows="3" placeholder="Deine Nachricht..."></textarea>
            <button class="btn-main" id="btn-send">ANFRAGE SENDEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";

        // Login Funktion
        document.getElementById('btn-login').onclick = () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login-Daten falsch"));
        };

        // Logout Funktion
        document.getElementById('btn-logout').onclick = () => {
            signOut(auth);
        };

        // Auth State
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('nav-header').classList.remove('hidden');
                initPortal(user.displayName || "Kunde");
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('nav-header').classList.add('hidden');
            }
        });

        function initPortal(userName) {
            const userKey = userName.toLowerCase().replace(/[^a-z0-9]/g, '');

            // Live-Status
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                const card = document.getElementById('status-card');
                if(s.exists() && s.data().active && s.data().partner.toLowerCase().replace(/[^a-z0-9]/g, '') === userKey) {
                    card.classList.add('status-active');
                    document.getElementById('status-title').innerText = "PROJEKT IN ARBEIT";
                    document.getElementById('status-desc').innerText = s.data().project || "Wird aktuell bearbeitet.";
                } else {
                    card.classList.remove('status-active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                    document.getElementById('status-desc').innerText = "Bereit für neue Aufgaben.";
                }
            });

            // Worklogs (Tage & Kalender)
            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const logs = snap.docs.map(d => d.data()).filter(l => l.partner.toLowerCase().replace(/[^a-z0-9]/g, '') === userKey);
                
                // Kalender Markierung & Zeit
                let totalSec = 0;
                const workedDates = new Set();

                logs.forEach(l => {
                    // Zeit addieren
                    const p = (l.duration || "0:0:0").split(':').map(Number);
                    if(p.length === 3) totalSec += (p[0]*3600) + (p[1]*60) + p[2];
                    else if(p.length === 2) totalSec += (p[0]*60) + p[1];

                    // Datum formatieren für Vergleich (von 28.3.2026 zu 2026-03-28)
                    if(l.date && l.date.includes('.')) {
                        const parts = l.date.split('.');
                        const d = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                        workedDates.add(d);
                    } else {
                        workedDates.add(l.date);
                    }
                });

                document.getElementById('insight-days').innerText = workedDates.size;
                document.getElementById('insight-hours').innerText = (totalSec / 3600).toFixed(1) + "h";
                
                renderCalendar(Array.from(workedDates));
            });
        }

        function renderCalendar(workedDates) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            for(let i = 1; i <= daysInMonth; i++) {
                const dStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const day = document.createElement('div');
                day.className = 'cal-day' + (workedDates.includes(dStr) ? ' worked' : '');
                day.innerText = i;
                grid.appendChild(day);
            }
        }

        // Anfrage senden
        document.getElementById('btn-send').onclick = async () => {
            const t = document.getElementById('req-title').value;
            const d = document.getElementById('req-desc').value;
            if(!t || !d) return alert("Bitte Felder ausfüllen");
            
            await addDoc(collection(db, "requests"), {
                title: t,
                desc: d,
                partner: auth.currentUser.displayName || "Kunde",
                timestamp: serverTimestamp()
            });
            alert("Anfrage gesendet!");
            document.getElementById('req-title').value = "";
            document.getElementById('req-desc').value = "";
        };
    </script>
</body>
</html>
