<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; --danger: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; min-height: 100vh; }
        .hidden { display: none !important; }

        /* --- LOGIN SCREEN --- */
        #auth-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: var(--bg); z-index: 10000;
        }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--cyan); width: 90%; max-width: 380px; text-align: center; }
        
        /* --- MAIN PORTAL --- */
        #main-content { padding: calc(70px + env(safe-area-inset-top)) 20px 40px 20px; max-width: 600px; margin: 0 auto; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 9000; border-bottom: 1px solid rgba(0,206,209,0.2); }
        .header h1 { font-family: 'Rajdhani'; font-size: 1.2rem; letter-spacing: 2px; }
        .header h1 span { color: var(--cyan); }

        .status-card { background: var(--panel); border-radius: 20px; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: center; transition: 0.3s; }
        .status-card.active { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 206, 209, 0.2); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--panel); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { display: block; color: var(--cyan); font-weight: 700; font-size: 1.4rem; font-family: 'Rajdhani'; }
        
        /* Kalender */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--panel); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 6px; background: #000; color: #444; border: 1px solid transparent; }
        .cal-day.worked { background: rgba(0, 206, 209, 0.15); color: var(--cyan); border: 1px solid var(--cyan); font-weight: bold; box-shadow: 0 0 8px rgba(0,206,209,0.3); }
        .cal-header { font-size: 0.6rem; color: var(--gray); text-align: center; margin-bottom: 5px; text-transform: uppercase; }

        .log-item { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--cyan); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--cyan); }
        .btn-primary { width: 100%; background: var(--cyan); border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Rajdhani'; color: #000; text-transform: uppercase; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family:'Rajdhani'; margin-bottom:20px;">ICONIC <span style="color:var(--cyan)">PORTAL</span></h2>
            <input type="email" id="login-email" placeholder="E-Mail">
            <input type="password" id="login-pass" placeholder="Passwort">
            <button class="btn-primary" id="login-btn" onclick="handleAuth()">Einloggen</button>
            <p id="auth-error" style="color:var(--danger); font-size:0.75rem; margin-top:15px;"></p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="header">
            <h1>ICONIC <span>PORTAL</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2rem;"><i class="fa-solid fa-power-off"></i></button>
        </div>
        
        <div id="status-card" class="status-card">
            <h2 id="status-title" style="font-family:'Rajdhani';">PRÜFE STATUS...</h2>
            <p id="status-desc" style="color:var(--gray); font-size:0.8rem; margin-top:5px;">Verbindung zum System wird hergestellt.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span id="insight-days" class="stat-val">0</span><span style="font-size:0.6rem; color:var(--gray); letter-spacing:1px;">TAGE AKTIV</span></div>
            <div class="stat-box"><span id="insight-hours" class="stat-val">0.0h</span><span style="font-size:0.6rem; color:var(--gray); letter-spacing:1px;">GESAMTZEIT</span></div>
        </div>

        <h3 style="font-family:'Rajdhani'; font-size:0.9rem; color:var(--gray); margin-bottom:10px; padding-left:5px;">AKTIVITÄT DIESER MONAT</h3>
        <div class="calendar-grid" id="calendar"></div>

        <div id="log-list">
            <h3 style="font-family:'Rajdhani'; font-size:0.9rem; color:var(--gray); margin:20px 0 10px 5px;">LETZTE LOGS</h3>
            <div id="log-container"></div>
        </div>

        <div style="background:var(--panel); padding:20px; border-radius:20px; margin-top:30px;">
            <h3 style="font-family:'Rajdhani'; margin-bottom:15px; color:var(--cyan)">NEUE ANFRAGE</h3>
            <input type="text" id="req-title" placeholder="Projekt / Betreff">
            <textarea id="req-msg" rows="3" placeholder="Wie kann ich dir helfen?"></textarea>
            <button class="btn-primary" onclick="sendRequest()">Anfrage Senden</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // ADMIN_UID bleibt wie von dir vorgegeben
        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";

        // Normalisierung für den Vergleich (Partnername im CRM vs. Login)
        const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim() : "";

        window.handleAuth = async () => {
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            btn.disabled = true;
            btn.innerText = "Lade...";
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('auth-error').innerText = "Login ungültig.";
                btn.disabled = false;
                btn.innerText = "Einloggen";
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                // Nutze displayName (falls gesetzt) oder den Teil vor dem @ der E-Mail
                const partnerName = user.displayName || user.email.split('@')[0];
                initPortal(partnerName);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        function initPortal(userName) {
            const userKey = normalize(userName);

            // 1. LIVE STATUS (Global)
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                const card = document.getElementById('status-card');
                const data = s.data();
                if(s.exists() && data.active && normalize(data.partner) === userKey) {
                    card.classList.add('active');
                    document.getElementById('status-title').innerText = "PROJEKT IN ARBEIT";
                    document.getElementById('status-desc').innerText = data.project || "Aktuelle Bearbeitung läuft...";
                } else {
                    card.classList.remove('active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                    document.getElementById('status-desc').innerText = "Bereit für neue Aufgaben.";
                }
            });

            // 2. WORKLOGS (Gezielte Abfrage für Speed!)
            // Wir filtern direkt in Firebase nach dem Partnernamen
            const logsQuery = query(collection(db, "users", ADMIN_UID, "worklogs"), orderBy("date", "desc"));

            onSnapshot(logsQuery, (snap) => {
                // Da CRM-Partnernamen variieren können, filtern wir hier sicherheitshalber nochmal normalisiert
                const allLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const myLogs = allLogs.filter(l => normalize(l.partner) === userKey);
                
                // Stats
                const uniqueDays = new Set(myLogs.map(l => l.date)).size;
                document.getElementById('insight-days').innerText = uniqueDays;
                
                let totalSec = 0;
                myLogs.forEach(l => {
                    const p = (l.duration || "0:0:0").split(':').map(Number);
                    if(p.length === 3) totalSec += (p[0]*3600) + (p[1]*60) + p[2];
                });
                document.getElementById('insight-hours').innerText = (totalSec / 3600).toFixed(1) + "h";

                renderCalendar(myLogs);
                renderLogs(myLogs);
            });
        }

        function renderCalendar(logs) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const workedDates = logs.map(l => l.date); // Format YYYY-MM-DD

            for(let i = 1; i <= daysInMonth; i++) {
                const dStr = `${year}-${(month+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const div = document.createElement('div');
                div.className = 'cal-day' + (workedDates.includes(dStr) ? ' worked' : '');
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('log-container');
            if(logs.length === 0) {
                container.innerHTML = "<p style='color:var(--gray); font-size:0.75rem; text-align:center; margin-top:10px;'>Noch keine Aktivitäten aufgezeichnet.</p>";
                return;
            }

            // Nur die letzten 8 Logs anzeigen für die Übersicht
            container.innerHTML = logs.slice(0, 8).map(l => `
                <div class="log-item">
                    <div>
                        <strong style="color:var(--white)">${l.project || 'Projekt-Update'}</strong><br>
                        <small style="color:var(--gray)">${new Date(l.date).toLocaleDateString('de-DE')}</small>
                    </div>
                    <div style="color:var(--cyan); font-weight:bold; font-family:'Rajdhani'; font-size:1.1rem;">${l.duration}</div>
                </div>
            `).join('');
        }

        window.sendRequest = async () => {
            const title = document.getElementById('req-title').value;
            const msg = document.getElementById('req-msg').value;
            if(!title || !msg) return alert("Bitte alles ausfüllen.");
            
            try {
                await addDoc(collection(db, "requests"), {
                    title: title,
                    desc: msg,
                    partner: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
                    timestamp: Date.now()
                });
                alert("Anfrage wurde erfolgreich übermittelt!");
                document.getElementById('req-title').value = "";
                document.getElementById('req-msg').value = "";
            } catch (e) {
                alert("Fehler beim Senden.");
            }
        };
    </script>
</body>
</html>
