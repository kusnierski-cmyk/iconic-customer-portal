<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: var(--white); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* LOGIN SCREEN - Absolut sauber getrennt */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 350px;
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0,206,209,0.2);
            text-align: center;
        }

        /* PORTAL SCREEN */
        #main-content { padding: 80px 20px 20px 20px; }

        .header { 
            position: fixed; top: 0; left: 0; right: 0; height: 60px; 
            background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(0,206,209,0.2); 
        }

        /* UI Elemente */
        .status-card { background: var(--panel); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: center; }
        .status-card.active { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 206, 209, 0.1); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--panel); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { display: block; color: var(--cyan); font-weight: 700; font-size: 1.2rem; font-family: 'Rajdhani'; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: var(--panel); padding: 15px; border-radius: 15px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; border-radius: 5px; background: #000; color: #333; }
        .cal-day.worked { background: rgba(0, 206, 209, 0.1); color: var(--cyan); border: 1px solid var(--cyan); font-weight: bold; }

        .activity-item { background: var(--panel); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 3px solid var(--cyan); font-size: 0.8rem; }

        /* Inputs & Buttons */
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-family: inherit; }
        .btn-send { width: 100%; background: var(--cyan); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 700; font-family: 'Rajdhani'; cursor: pointer; }
        .btn-send:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-box">
            <h2 style="font-family:'Rajdhani'; color:var(--cyan); margin-bottom:20px;">PORTAL LOGIN</h2>
            <input type="email" id="email" placeholder="E-Mail">
            <input type="password" id="pass" placeholder="Passwort">
            <button id="login-btn" onclick="handleAuth()" class="btn-send">EINLOGGEN</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="header">
            <h1 style="font-family:'Rajdhani'; font-size:1.1rem; letter-spacing:1px;">ICONIC <span>PORTAL</span></h1>
            <button onclick="auth.signOut()" style="background:none; border:none; color:#ff4444;"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="status-card" class="status-card">
            <h2 id="status-title" style="margin:0; font-family:'Rajdhani';">SYSTEM STANDBY</h2>
            <p id="project-label" style="color:var(--gray); font-size:0.8rem; margin-top:5px;">Bereit für neue Aufgaben</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span id="insight-days" class="stat-val">0</span><span style="font-size:0.6rem; color:var(--gray);">TAGE</span></div>
            <div class="stat-box"><span id="insight-hours" class="stat-val">0.0h</span><span style="font-size:0.6rem; color:var(--gray);">STUNDEN</span></div>
        </div>

        <div style="margin-bottom:20px;">
            <h3 style="font-family:'Rajdhani'; font-size:0.8rem; color:var(--gray); margin-bottom:10px;">AKTIVITÄT</h3>
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div id="activity-list" style="margin-bottom:30px;">
            <h3 style="font-family:'Rajdhani'; font-size:0.8rem; color:var(--gray); margin-bottom:10px;">LETZTE LOGS</h3>
            <div id="activity-container"></div>
        </div>

        <div class="status-card" style="text-align:left;">
            <h3 style="font-family:'Rajdhani'; font-size:1rem; color:var(--cyan); margin:0 0 15px 0;">ANFRAGE SENDEN</h3>
            <input type="text" id="req-title" placeholder="Projekt Name">
            <textarea id="req-desc" rows="3" placeholder="Deine Nachricht..."></textarea>
            <button onclick="sendRequest()" class="btn-send">ABSENDEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";

        const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim() : "";

        // LOGIN FUNKTION
        window.handleAuth = () => {
            const btn = document.getElementById('login-btn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!email || !pass) return alert("Daten eingeben!");

            btn.disabled = true;
            btn.innerText = "LOGGE EIN...";

            signInWithEmailAndPassword(auth, email, pass)
                .catch(err => {
                    alert("Login Fehler: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "EINLOGGEN";
                });
        };

        // AUTH ZUSTAND ÜBERWACHEN
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initPortal(user.displayName || user.email.split('@')[0]);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn').innerText = "EINLOGGEN";
            }
        });

        function initPortal(userName) {
            const userKey = normalize(userName);

            // 1. Live Sync
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                const card = document.getElementById('status-card');
                if(s.exists() && s.data().active && normalize(s.data().partner) === userKey) {
                    card.classList.add('active');
                    document.getElementById('status-title').innerText = "PROJEKT IN ARBEIT";
                    document.getElementById('project-label').innerText = s.data().project || "In Bearbeitung";
                } else {
                    card.classList.remove('active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                    document.getElementById('project-label').innerText = "Bereit für neue Aufgaben";
                }
            });

            // 2. Worklogs & History
            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const logs = snap.docs.map(d => d.data()).filter(l => normalize(l.partner) === userKey);
                
                // Stats
                const uniqueDays = new Set(logs.map(l => l.date)).size;
                document.getElementById('insight-days').innerText = uniqueDays;
                
                let totalSec = 0;
                logs.forEach(l => {
                    const p = (l.duration || "0:0:0").split(':').map(Number);
                    if(p.length === 3) totalSec += (p[0]*3600) + (p[1]*60) + p[2];
                    else if(p.length === 2) totalSec += (p[0]*60) + p[1];
                });
                document.getElementById('insight-hours').innerText = (totalSec / 3600).toFixed(1) + "h";

                renderCalendar(logs);
                renderActivityList(logs);
            });
        }

        function renderCalendar(logs) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            const workedDates = logs.map(l => {
                if(!l.date) return "";
                if(l.date.includes('.')) {
                    const [d, m, y] = l.date.split('.');
                    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                }
                return l.date;
            });

            for(let i = 1; i <= daysInMonth; i++) {
                const dStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const div = document.createElement('div');
                div.className = 'cal-day' + (workedDates.includes(dStr) ? ' worked' : '');
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function renderActivityList(logs) {
            const container = document.getElementById('activity-container');
            const sorted = logs.sort((a,b) => {
                const dateA = a.date.includes('.') ? a.date.split('.').reverse().join('-') : a.date;
                const dateB = b.date.includes('.') ? b.date.split('.').reverse().join('-') : b.date;
                return new Date(dateB) - new Date(dateA);
            }).slice(0, 5);

            if(sorted.length === 0) {
                container.innerHTML = "<p style='color:#333; font-size:0.7rem;'>Noch keine Einträge vorhanden.</p>";
                return;
            }

            container.innerHTML = sorted.map(l => `
                <div class="activity-item">
                    <div><strong>${l.project || 'Projekt'}</strong><br><small style="color:#555">${l.date}</small></div>
                    <div style="color:var(--cyan); font-weight:bold;">${l.duration}</div>
                </div>
            `).join('');
        }

        window.sendRequest = async () => {
            const t = document.getElementById('req-title').value;
            const d = document.getElementById('req-desc').value;
            if(!t || !d) return alert("Bitte ausfüllen!");
            await addDoc(collection(db, "requests"), {
                title: t, desc: d, partner: auth.currentUser.displayName || "Kunde", timestamp: serverTimestamp()
            });
            alert("Anfrage gesendet!");
            document.getElementById('req-title').value = ""; document.getElementById('req-desc').value = "";
        };
    </script>
</body>
</html>
