<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICONIC OS | Agency Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ICONIC OS">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #050505; --bg-panel: #111111; --bg-hover: #1a1a1a;
            --cyan: #00CED1; --white: #ffffff; --gray: #888888; 
            --danger: #ff4757; --success: #2ed573; --warning: #ffa502;
            --font-logo: 'Rajdhani', sans-serif; --font-ui: 'Montserrat', sans-serif;
            --nav-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--white); font-family: var(--font-ui); overflow-x: hidden; display: flex; height: 100vh; }

        /* --- LOGIN OVERLAY --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); z-index: 9999; display: flex; 
            align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--bg-panel); padding: 40px; border-radius: 15px; 
            border: 1px solid var(--cyan); width: 100%; max-width: 400px; text-align: center;
        }

        /* --- NAVIGATION --- */
        .sidebar { width: var(--nav-width); background: var(--bg-panel); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 30px 20px; z-index: 100; }
        .logo { font-family: var(--font-logo); font-size: 2rem; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: 2px; margin-bottom: 50px; text-align: center;}
        .logo span { color: var(--cyan); }
        .nav-links { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: var(--gray); text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s; cursor: pointer; }
        .nav-item i { font-size: 1.2rem; width: 25px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 206, 209, 0.1); color: var(--cyan); }
        
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; padding-bottom: 120px; display: none; }
        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }

        /* --- BRAND HEADER --- */
        .brand-header { font-family: var(--font-logo); margin-bottom: 30px; border-bottom: 1px solid rgba(0, 206, 209, 0.3); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .brand-header h1 { font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; }
        .brand-header span { color: var(--cyan); }

        /* --- KPI & GRID --- */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-box { text-align: center; border-top: 3px solid var(--cyan); }
        .kpi-box .val { font-family: var(--font-logo); font-size: 2.5rem; margin-top: 10px; }

        /* --- UI ELEMENTS --- */
        .card { background: var(--bg-panel); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .form-control { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 15px; }
        .btn-submit { width: 100%; background: var(--cyan); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        
        /* TIMER */
        .timer-display { font-family: var(--font-logo); font-size: 4rem; text-align: center; color: var(--white); margin-top: 20px; }
        .timer-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .btn-timer { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; flex: 1; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .cal-cell.has-work { border-color: var(--cyan); color: var(--cyan); }

        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(17,17,17,0.95); backdrop-filter: blur(10px); z-index: 1000; padding: 10px 0; }
        @media (max-width: 900px) { .sidebar { display: none; } .bottom-nav { display: flex; justify-content: space-around; } .main-content { padding: 15px; } }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: var(--white); font-family: var(--font-logo);">ICONIC<br><span style="color: var(--cyan);">ACCESS</span></h2>
            <input type="email" id="auth-email" class="form-control" placeholder="E-Mail">
            <input type="password" id="auth-password" class="form-control" placeholder="Passwort">
            <button class="btn-submit" onclick="handleAuth()">Login / Register</button>
            <p id="auth-error" style="color: var(--danger); font-size: 0.8rem; margin-top: 15px;"></p>
        </div>
    </div>

    <aside class="sidebar">
        <a href="#" class="logo">ICONIC<br><span>OS</span></a>
        <div class="nav-links">
            <div class="nav-item active" onclick="switchTab('dashboard')"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
            <div class="nav-item" onclick="switchTab('work')"><i class="fa-solid fa-stopwatch"></i> Work / Timer</div>
            <div class="nav-item" onclick="switchTab('finanzen')"><i class="fa-solid fa-wallet"></i> Finanzen</div>
            <div class="nav-item" onclick="switchTab('crm')"><i class="fa-solid fa-users"></i> CRM / Kunden</div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</div>
        </div>
    </aside>

    <main class="main-content" id="main-app">
        <div class="brand-header">
            <h1>ICONIC <span>VISUAL CONCEPTS</span></h1>
            <div onclick="logout()" style="color: var(--danger); cursor: pointer;"><i class="fa-solid fa-right-from-bracket"></i></div>
        </div>

        <div id="view-dashboard" class="view-section active">
            <div class="dash-grid">
                <div class="card kpi-box"><label>Gewinn (Netto)</label><div id="dash-profit" class="val">0,00 €</div></div>
                <div class="card kpi-box" style="border-top-color: var(--success);"><label>Brutto-Umsatz</label><div id="dash-revenue" class="val" style="color: var(--success);">0,00 €</div></div>
            </div>
            <div id="chartWrapper" class="card" style="height: 300px;">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div id="view-work" class="view-section">
            <div class="card">
                <h2 style="color: var(--cyan); margin-bottom: 20px;">Time Tracker</h2>
                <select id="timer-partner-select" class="form-control"></select>
                <input type="text" id="timer-project" class="form-control" placeholder="Projekt Name">
                <div class="timer-display" id="display">00:00:00</div>
                <div class="timer-controls">
                    <button class="btn-timer" style="background:var(--success)" onclick="startTimer()" id="startBtn">Start</button>
                    <button class="btn-timer" style="background:var(--danger); color:white; display:none;" onclick="stopAndBookTimer()" id="stopBtn">Stop</button>
                </div>
                <div class="calendar-grid" id="calendar-grid" style="margin-top: 30px;"></div>
            </div>
        </div>

        <div id="view-finanzen" class="view-section">
            <div class="card">
                <h2>Buchung</h2>
                <select id="txn-partner-select" class="form-control"></select>
                <input type="number" id="amount" class="form-control" placeholder="Betrag €">
                <button class="btn-submit" onclick="addTxnManual()">Buchen</button>
            </div>
            <div id="txnList"></div>
        </div>

        <div id="view-crm" class="view-section">
            <div class="card">
                <h2>Kunde anlegen</h2>
                <input type="text" id="crm-company" class="form-control" placeholder="Name (wie im Portal registriert)">
                <input type="email" id="crm-email" class="form-control" placeholder="Email">
                <button class="btn-submit" onclick="saveCustomer()">Kunde Speichern</button>
            </div>
            <div id="crmList"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userUid = null;
        window.customers = [];
        window.transactions = [];
        window.workLogs = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userUid = user.uid;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                startSync();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        function startSync() {
            onSnapshot(collection(db, "users", userUid, "customers"), (snap) => {
                window.customers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderCRM();
                updateSelects();
            });
            onSnapshot(query(collection(db, "users", userUid, "transactions"), orderBy("timestamp", "desc")), (snap) => {
                window.transactions = snap.docs.map(d => d.data());
                renderFinanzen();
            });
            onSnapshot(collection(db, "users", userUid, "worklogs"), (snap) => {
                window.workLogs = snap.docs.map(d => d.data());
                renderCalendar();
            });
        }

        window.saveCustomer = async () => {
            const company = document.getElementById('crm-company').value;
            const email = document.getElementById('crm-email').value;
            await addDoc(collection(db, "users", userUid, "customers"), { company, email });
            document.getElementById('crm-company').value = "";
        };

        window.addTxnManual = async () => {
            const amt = parseFloat(document.getElementById('amount').value);
            const part = document.getElementById('txn-partner-select').value;
            await addDoc(collection(db, "users", userUid, "transactions"), {
                amount: amt, partner: part, timestamp: Date.now(), type: 'Einnahme', date: new Date().toLocaleDateString()
            });
        };

        // TIMER LOGIK
        let timerStart, timerInt;
        window.startTimer = () => {
            timerStart = Date.now();
            timerInt = setInterval(() => {
                const diff = Date.now() - timerStart;
                document.getElementById('display').innerText = new Date(diff).toISOString().substr(11, 8);
            }, 1000);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
        };

        window.stopAndBookTimer = async () => {
            clearInterval(timerInt);
            const diff = Date.now() - timerStart;
            const partner = document.getElementById('timer-partner-select').value;
            const project = document.getElementById('timer-project').value;
            
            // Log für CRM
            await addDoc(collection(db, "users", userUid, "worklogs"), {
                partner, project, duration: (diff/3600000).toFixed(2), date: new Date().toISOString().split('T')[0]
            });

            // Sync zum Kundenportal (Über den Namen "Test" etc.)
            await setDoc(doc(db, "projekte", partner), {
                kunde: partner,
                projektname: project,
                status: "In Arbeit",
                letztes_update: new Date().toLocaleDateString()
            }, { merge: true });

            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('display').innerText = "00:00:00";
        };

        // RENDER FUNKTIONEN
        function renderCRM() {
            document.getElementById('crmList').innerHTML = window.customers.map(c => `<div class="card">${c.company} (${c.email})</div>`).join('');
        }
        function updateSelects() {
            const options = window.customers.map(c => `<option value="${c.company}">${c.company}</option>`).join('');
            document.getElementById('timer-partner-select').innerHTML = options;
            document.getElementById('txn-partner-select').innerHTML = options;
        }
        function renderFinanzen() {
            document.getElementById('txnList').innerHTML = window.transactions.map(t => `<div class="card">${t.partner}: ${t.amount}€</div>`).join('');
        }
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            for(let i=1; i<=31; i++) {
                grid.innerHTML += `<div class="cal-cell">${i}</div>`;
            }
        }
        window.switchTab = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-'+id).classList.add('active');
        };
        window.handleAuth = () => {
            signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
        };
        window.logout = () => signOut(auth);
    </script>
</body>
</html>
