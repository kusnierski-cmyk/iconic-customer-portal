<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICONIC | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cyan: #00CED1; --bg: #050505; --panel: #111111; --white: #ffffff; --gray: #888888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px; padding-top: 70px; }
        .hidden { display: none !important; }

        /* Navigation */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(0,206,209,0.2); }
        .header h1 { font-family: 'Rajdhani'; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
        .header span { color: var(--cyan); }
        .logout-btn { background: none; border: none; color: #ff4444; font-size: 1.2rem; cursor: pointer; }

        /* Status Karte */
        .status-card { background: var(--panel); border-radius: 20px; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; text-align: center; }
        .status-card.active { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 206, 209, 0.15); }
        .status-card h2 { font-family: 'Rajdhani'; font-size: 1.3rem; margin: 0 0 5px 0; }
        .project-label { background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 10px; display: inline-block; margin-top: 10px; font-size: 0.85rem; color: var(--cyan); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--panel); padding: 18px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { display: block; color: var(--cyan); font-weight: 700; font-size: 1.3rem; font-family: 'Rajdhani'; }
        .stat-label { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }

        /* Kalender */
        .calendar-section { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 6px; background: #000; color: #333; }
        .cal-day.worked { background: rgba(0, 206, 209, 0.1); color: var(--cyan); border: 1px solid var(--cyan); font-weight: bold; }

        /* Aktivitätsliste */
        .activity-list { margin-bottom: 30px; }
        .activity-item { background: var(--panel); padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border-left: 3px solid var(--cyan); }
        .activity-info { display: flex; flex-direction: column; }
        .activity-date { font-size: 0.7rem; color: var(--gray); }

        /* Formular */
        .form-area { background: var(--panel); padding: 20px; border-radius: 20px; margin-top: 20px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-family: inherit; outline: none; }
        .btn-send { width: 100%; background: var(--cyan); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 700; font-family: 'Rajdhani'; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nav-header" class="header hidden">
        <h1>ICONIC <span>PORTAL</span></h1>
        <button class="logout-btn" onclick="auth.signOut()"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <div id="auth-overlay" style="max-width: 320px; margin: 100px auto; text-align: center;">
        <h2 style="font-family:'Rajdhani'; color:var(--cyan);">PORTAL LOGIN</h2>
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Passwort">
        <button onclick="handleAuth()" class="btn-send">ANMELDEN</button>
    </div>

    <div id="main-content" class="hidden">
        <div id="status-card" class="status-card">
            <h2 id="status-title">SYSTEM STANDBY</h2>
            <div id="project-label" class="project-label">Bereit</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span id="insight-days" class="stat-val">0</span><span class="stat-label">Arbeitstage</span></div>
            <div class="stat-box"><span id="insight-hours" class="stat-val">0.0h</span><span class="stat-label">Gesamtzeit</span></div>
        </div>

        <div class="calendar-section">
            <div id="calendar" class="calendar-grid"></div>
        </div>

        <div class="activity-list">
            <h3 style="font-family:'Rajdhani'; font-size:0.9rem; color:var(--gray); margin-bottom:10px;">LETZTE AKTIVITÄTEN</h3>
            <div id="activity-container"></div>
        </div>

        <div class="form-area">
            <h3 style="font-family:'Rajdhani'; margin-top:0; color:var(--cyan); font-size:1rem;">ANFRAGE SENDEN</h3>
            <input type="text" id="req-title" placeholder="Betreff">
            <textarea id="req-desc" rows="3" placeholder="Deine Nachricht..."></textarea>
            <button onclick="sendRequest()" class="btn-send">ABSCHICKEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpe53FCPn8A-ZqrIadjm_cx6IRyUAy0h4",
            authDomain: "iconic-visual-concepts-crm.firebaseapp.com",
            projectId: "iconic-visual-concepts-crm",
            storageBucket: "iconic-visual-concepts-crm.firebasestorage.app",
            messagingSenderId: "689489453527",
            appId: "1:689489453527:web:8751120904703b47602b92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_UID = "6y8P9lG8uYUrXvV9T6vW8eE2lFh2";

        const normalize = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '').trim() : "";

        window.handleAuth = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login fehlgeschlagen."));
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('nav-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initPortal(user.displayName || user.email.split('@')[0]);
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('nav-header').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        function initPortal(userName) {
            const userKey = normalize(userName);

            // 1. Live-Status
            onSnapshot(doc(db, "global_status", "live"), (s) => {
                const card = document.getElementById('status-card');
                if(s.exists() && s.data().active && normalize(s.data().partner) === userKey) {
                    card.classList.add('active');
                    document.getElementById('status-title').innerText = "PROJEKT IN ARBEIT";
                    document.getElementById('project-label').innerText = s.data().project || "In Bearbeitung";
                } else {
                    card.classList.remove('active');
                    document.getElementById('status-title').innerText = "SYSTEM STANDBY";
                    document.getElementById('project-label').innerText = "Bereit";
                }
            });

            // 2. Worklogs & History
            onSnapshot(collection(db, "users", ADMIN_UID, "worklogs"), (snap) => {
                const allLogs = snap.docs.map(d => d.data());
                const logs = allLogs.filter(l => normalize(l.partner) === userKey);
                
                // Stats
                const uniqueDays = new Set(logs.map(l => l.date)).size;
                document.getElementById('insight-days').innerText = uniqueDays;
                
                let totalSec = 0;
                logs.forEach(l => {
                    const p = (l.duration || "0:0:0").split(':').map(Number);
                    if(p.length === 3) totalSec += (p[0]*3600) + (p[1]*60) + p[2];
                    else if(p.length === 2) totalSec += (p[0]*60) + p[1];
                });
                document.getElementById('insight-hours').innerText = (totalSec / 3600).toFixed(2) + "h";

                renderCalendar(logs);
                renderActivityList(logs);
            });
        }

        function renderCalendar(logs) {
            const grid = document.getElementById('calendar');
            grid.innerHTML = "";
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            // Mappt CRM Daten (28.3.2026) auf ISO-Format für den Vergleich
            const workedDates = logs.map(l => {
                if(!l.date) return "";
                if(l.date.includes('.')) {
                    const [d, m, y] = l.date.split('.');
                    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                }
                return l.date;
            });

            for(let i = 1; i <= daysInMonth; i++) {
                const dStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                const div = document.createElement('div');
                div.className = 'cal-day' + (workedDates.includes(dStr) ? ' worked' : '');
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function renderActivityList(logs) {
            const container = document.getElementById('activity-container');
            if(logs.length === 0) {
                container.innerHTML = "<p style='color:#444; font-size:0.8rem;'>Noch keine Aktivitäten aufgezeichnet.</p>";
                return;
            }
            
            const sorted = logs.sort((a,b) => {
                const dateA = a.date.includes('.') ? a.date.split('.').reverse().join('-') : a.date;
                const dateB = b.date.includes('.') ? b.date.split('.').reverse().join('-') : b.date;
                return new Date(dateB) - new Date(dateA);
            }).slice(0, 5); // Zeige nur die letzten 5

            container.innerHTML = sorted.map(l => `
                <div class="activity-item">
                    <div class="activity-info">
                        <strong>${l.project || 'Projekt'}</strong>
                        <span class="activity-date">${l.date}</span>
                    </div>
                    <span style="color:var(--cyan); font-weight:bold;">${l.duration}</span>
                </div>
            `).join('');
        }

        window.sendRequest = async () => {
            const t = document.getElementById('req-title').value;
            const d = document.getElementById('req-desc').value;
            if(!t || !d) return alert("Bitte Felder ausfüllen.");
            await addDoc(collection(db, "requests"), {
                title: t, desc: d, partner: auth.currentUser.displayName || "Kunde", timestamp: Date.now()
            });
            alert("Anfrage gesendet!");
            document.getElementById('req-title').value = ""; document.getElementById('req-desc').value = "";
        };
    </script>
</body>
</html>
